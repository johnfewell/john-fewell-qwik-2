<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Fall — Generative Art Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Anthropic Brand Colors */
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Control Sections */
        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        /* Seed Controls */
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        /* Parameter Controls */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        /* Color Pickers */
        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        /* Buttons */
        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        /* Responsive - Stack on mobile */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Control Sidebar -->
        <div class="sidebar">
            <h1>Sakura Fall</h1>
            <div class="subtitle">Mono no aware as physics: petals surrendered to gravity, a shared noise wind, and their own tumble. Day or night sky, one seed per falling.</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="1147" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Petal Population</label>
                    <div class="slider-container">
                        <input type="range" id="petalCount" min="20" max="400" step="10" value="130" oninput="updateParam('petalCount', this.value)">
                        <span class="value-display" id="petalCount-value">130</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Fall Speed</label>
                    <div class="slider-container">
                        <input type="range" id="fallSpeed" min="10" max="160" step="2" value="46" oninput="updateParam('fallSpeed', this.value)">
                        <span class="value-display" id="fallSpeed-value">46</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Wind Strength</label>
                    <div class="slider-container">
                        <input type="range" id="windStrength" min="0" max="240" step="5" value="70" oninput="updateParam('windStrength', this.value)">
                        <span class="value-display" id="windStrength-value">70</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Gust Rhythm (surge speed)</label>
                    <div class="slider-container">
                        <input type="range" id="gustRhythm" min="0.01" max="0.3" step="0.005" value="0.055" oninput="updateParam('gustRhythm', this.value)">
                        <span class="value-display" id="gustRhythm-value">0.055</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Gust Blow (rightward push)</label>
                    <div class="slider-container">
                        <input type="range" id="gustBlow" min="0" max="700" step="20" value="320" oninput="updateParam('gustBlow', this.value)">
                        <span class="value-display" id="gustBlow-value">320</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flutter (tumble rate)</label>
                    <div class="slider-container">
                        <input type="range" id="flutter" min="0.2" max="3" step="0.1" value="1" oninput="updateParam('flutter', this.value)">
                        <span class="value-display" id="flutter-value">1</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Petal Size</label>
                    <div class="slider-container">
                        <input type="range" id="petalSize" min="0.5" max="3" step="0.1" value="1" oninput="updateParam('petalSize', this.value)">
                        <span class="value-display" id="petalSize-value">1</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Night Mode (yozakura)</label>
                    <div class="slider-container">
                        <input type="range" id="nightMode" min="0" max="1" step="1" value="0" oninput="updateParam('nightMode', this.value)">
                        <span class="value-display" id="nightMode-value">0</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Pale Blossom</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#ffd9e8" onchange="updateColor(0, this.value)">
                        <span class="color-value" id="color1-value">#ffd9e8</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Blossom Pink</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#f48fb8" onchange="updateColor(1, this.value)">
                        <span class="color-value" id="color2-value">#f48fb8</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Deep Pink</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#e76aa2" onchange="updateColor(2, this.value)">
                        <span class="color-value" id="color3-value">#e76aa2</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>White Blossom</label>
                    <div class="color-picker-container">
                        <input type="color" id="color4" value="#fff4f8" onchange="updateColor(3, this.value)">
                        <span class="color-value" id="color4-value">#fff4f8</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="regenerate()">Regenerate</button>
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
                <div style="height:8px"></div>
                <button class="button secondary" onclick="downloadPNG()">Download PNG</button>
            </div>
        </div>

        <!-- Main Canvas Area -->
        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // SAKURA FALL — PARAMETERS
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 1147,
            petalCount: 130,
            fallSpeed: 46,       // px/sec at depth 1
            windStrength: 70,    // px/sec horizontal at depth 1, full gust
            gustRhythm: 0.055,   // gust-channel noise speed
            gustBlow: 320,       // px/sec rightward at depth 1, full blow
            flutter: 1,          // tumble rate multiplier
            petalSize: 1,        // size multiplier
            nightMode: 0,        // 0 = day sky, 1 = yozakura
            colorPalette: ['#ffd9e8', '#f48fb8', '#e76aa2', '#fff4f8']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // ═══════════════════════════════════════════════════════════════════════
        // SAKURA FALL — ALGORITHM
        // Petals are rigid bodies under gravity, a shared noise wind, and
        // per-petal harmonic tumble. No trails: only the present moment.
        // ═══════════════════════════════════════════════════════════════════════

        const DAY_SKY = [224, 173, 136];   // the site's warm daylight surface
        const NIGHT_SKY = [10, 10, 30];    // yozakura indigo
        const WIND_SCALE = 0.0012;

        let petals = [];
        let simTime = 0;
        let paletteRGB = [];

        function hexToRgb(hex) {
            const n = parseInt(hex.slice(1), 16);
            return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
        }

        function rebuildPalette() {
            paletteRGB = params.colorPalette.map(hexToRgb);
        }

        class Petal {
            constructor(fromTop) {
                this.respawn(fromTop);
            }

            respawn(fromTop) {
                this.depth = 0.35 + random() * 0.65;
                this.size = (14 + random() * 16) * this.depth;
                this.x = random(-100, width + 100);
                this.y = fromTop ? -20 - random(60) : random(height);
                this.angle = random(TWO_PI);
                this.spin = random(-1.5, 1.5);
                this.tumble = random(TWO_PI);
                this.tumbleSpeed = 1.2 + random() * 2.6;
                this.flutterPhase = random(TWO_PI);
                this.color = paletteRGB[floor(random(paletteRGB.length))] || [255, 200, 220];
            }

            step(dt, gust, blow) {
                const wind = (noise(this.x * WIND_SCALE, this.y * WIND_SCALE, simTime * 0.12) - 0.5) * 2;
                this.tumble += this.tumbleSpeed * params.flutter * dt * (0.7 + 0.6 * gust);
                const face = sin(this.tumble); // 1 face-on … 0 edge-on

                // Flat petals catch the air: they stall vertically and drift more.
                const vy = params.fallSpeed * this.depth * (0.55 + 0.45 * (1 - abs(face)));
                const vx = wind * params.windStrength * this.depth * gust
                    + blow * params.gustBlow * this.depth
                    + sin(simTime * 2.1 + this.flutterPhase) * 9 * this.depth;

                this.x += vx * dt;
                this.y += vy * dt;
                this.angle += (this.spin + wind * 2.4 * gust + blow * 2.5) * dt;

                if (this.y > height + 30) this.respawn(true);
                if (this.x < -120) this.x = width + 100;
                else if (this.x > width + 120) this.x = -100;

                const night = params.nightMode >= 1;
                const alpha = 255 * (night ? 0.65 : 0.9)
                    * (0.4 + 0.6 * this.depth) * (0.55 + 0.45 * abs(face));

                push();
                translate(this.x, this.y);
                rotate(this.angle);
                scale(1, 0.35 + 0.65 * abs(face)); // fake 3D flip
                noStroke();
                fill(this.color[0], this.color[1], this.color[2], alpha);
                drawPetalShape(this.size * params.petalSize);
                pop();
            }
        }

        // Sakura silhouette: soft oval with the notched tip.
        function drawPetalShape(s) {
            beginShape();
            vertex(0, -s * 0.5);
            bezierVertex(s * 0.55, -s * 0.45, s * 0.5, s * 0.3, s * 0.12, s * 0.5);
            quadraticVertex(0, s * 0.32, -s * 0.12, s * 0.5);
            bezierVertex(-s * 0.5, s * 0.3, -s * 0.55, -s * 0.45, 0, -s * 0.5);
            endShape(CLOSE);
        }

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            rebuildPalette();
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            noiseDetail(3, 0.55);
            simTime = 0;

            petals = [];
            for (let i = 0; i < params.petalCount; i++) {
                petals.push(new Petal(false)); // pre-fill the sky
            }
        }

        function draw() {
            const dt = min(deltaTime / 1000, 0.05);
            simTime += dt;

            const sky = params.nightMode >= 1 ? NIGHT_SKY : DAY_SKY;
            background(sky[0], sky[1], sky[2]);

            // Gust channel: mostly calm, occasionally surging. Squaring biases
            // toward stillness so the surge reads as an event.
            const gustRaw = noise(simTime * params.gustRhythm, 7.3, 0);
            const gust = 0.25 + 1.9 * gustRaw * gustRaw;
            // Hard gusts have a direction: past the threshold the channel
            // becomes a rightward blow, ramping in smoothly.
            const blowRamp = constrain((gustRaw - 0.7) / 0.12, 0, 1);
            const blow = blowRamp * blowRamp;

            for (const p of petals) p.step(dt, gust, blow);
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI CONTROL HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        function updateParam(name, value) {
            params[name] = parseFloat(value);
            document.getElementById(name + '-value').textContent = value;
            if (name === 'petalCount') {
                // Population is structural: rebuild deterministically from the seed.
                initializeSystem();
            }
        }

        function updateColor(index, value) {
            params.colorPalette[index] = value;
            document.getElementById('color' + (index + 1) + '-value').textContent = value;
            rebuildPalette();
            for (const p of petals) {
                p.color = paletteRGB[floor(random(paletteRGB.length))];
            }
        }

        function regenerate() {
            initializeSystem();
        }

        function downloadPNG() {
            saveCanvas('sakura-fall-seed-' + params.seed, 'png');
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            for (const name of ['petalCount', 'fallSpeed', 'windStrength', 'gustRhythm', 'gustBlow', 'flutter', 'petalSize', 'nightMode']) {
                document.getElementById(name).value = params[name];
                document.getElementById(name + '-value').textContent = params[name];
            }

            params.colorPalette.forEach((hex, i) => {
                document.getElementById('color' + (i + 1)).value = hex;
                document.getElementById('color' + (i + 1) + '-value').textContent = hex;
            });
            rebuildPalette();

            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
